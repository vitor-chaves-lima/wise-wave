on:
  workflow_call:
    inputs:
      boundary_folder:
        required: true
        type: string

jobs:
  check_boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v1
      
      - name: Print Changed Files
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.files }}"