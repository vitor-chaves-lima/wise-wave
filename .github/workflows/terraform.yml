on: 
  pull_request: 
    branches: 
      - develop
    paths: 
      'terraform/**'
  
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
    
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.DEV_PIPELINE_ROLE }}
          role-session-name: terraform-ci-job
          aws-region: ${{ env.AWS_REGION }}

      # Adicionar permissões de execução no script de verificação de mudanças
      - name: Grant execute permission to script
        run: chmod +x ./scripts/check_changes_outside_folder.sh

      # Executar script Bash para verificar mudanças fora da pasta 'terraform'
      - name: Check for changes outside 'terraform' folder
        id: check_changes
        run: ./scripts/check_changes_outside_folder.sh terraform

      # Passo de lint do Terraform
      - name: Terraform Lint
        if: ${{ steps.check_changes.outputs.changes != 'true' }}
        run: terraform fmt -check

      # Passo de validação do Terraform
      - name: Terraform Validate
        if: ${{ steps.check_changes.outputs.changes != 'true' }}
        run: terraform validate

      # Passo de inicialização do terraform para o ambiente de dev
      - name: Terraform Initialization
        if: ${{ steps.check_changes.outputs.changes != 'true' }}
        working-directory: terraform/env/dev
        run: terraform init

      # Passo de plan do terraform para o ambiente de dev
      - name: Terraform Plan
        if: ${{ steps.check_changes.outputs.changes != 'true' }}
        working-directory: terraform/env/dev
        run: terraform plan -out=terraform.plan

      # Passo de upload do arquivo de plan do terraform
      - name: Upload Terraform Plan Artifact
        if: ${{ steps.check_changes.outputs.changes != 'true' }}
        uses: actions/upload-artifact@v2
        with:
          name: terraform-plan
          path: terraform.plan

  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event.pull_request.merged == true  # Condição para executar o job de CD apenas após o merge da PR
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2